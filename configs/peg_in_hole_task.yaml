peg_in_hole:
  reference_paper: Compliance-Based Robotic Peg-in-Hole Assembly Strategy Without Force Feedback
  model_xml: models/peg_in_hole_scene.xml

  sites:
    peg_tip: peg_tip_site
    hole_entry: hole_entry_site
    hole_axis: hole_axis_site

  geometry:
    hole_entry_world: [0.0983017899, -0.9704570878, 0.1909713723]
    initial_search_offset_xy: [0.016, -0.012]
    pre_insert_clearance: 0.10
    grasp_to_tip: 0.09
    alignment_tolerance: 0.004
    shaft_radius: 0.010
    shaft_half_length: 0.060

  state_sequence:
    - idle
    - approach_hole
    - grasp_peg
    - move_to_pre_insert
    - reaching_push
    - searching_spiral
    - inserting_wiggle_screw
    - complete

  search:
    planner: archimedes_spiral
    radius_max: 0.03
    pitch: 0.003
    angular_speed: 2.0
    timeout: 30.0

  insertion:
    push_depth: 0.03
    success_depth: 0.025
    wiggle_amplitude: 0.002
    screw_amplitude_rad: 0.2
    screw_turns: 3.0
    handoff_duration: 0.8
    duration: 5.0
    timeout: 8.0

  force_control:
    target_force: 5.0
    k_force: 0.004
    max_speed: 0.015
    filter_alpha: 0.15
    deadband: 0.10
    pseudo_contact_stiffness: 1200.0

  contact_detection:
    use_kinematic_velocity: true
    velocity_threshold: 0.02
    hold_time: 0.3
    contact_tolerance: 0.002
